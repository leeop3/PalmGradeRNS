name: Build PalmGrade RNS APK

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]

env:
  JAVA_VERSION: '17'
  ANDROID_API:  '34'
  BUILD_TOOLS:  '34.0.0'

jobs:

  # ── Debug build ─────────────────────────────────────────────────────────
  build-debug:
    name: Debug APK
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.build_type == 'debug'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >
            platforms;android-${{ env.ANDROID_API }}
            build-tools;${{ env.BUILD_TOOLS }}

      # Guarantee gradle.properties exists with the required AndroidX flag.
      # This step is a safety net in case the file is missing from the repo
      # or was excluded by .gitignore. It only sets the property if not
      # already present, so it never overwrites an existing value.
      - name: Ensure gradle.properties has android.useAndroidX
        run: |
          PROPS="gradle.properties"
          if [ ! -f "$PROPS" ]; then
            echo "gradle.properties not found — creating it"
            touch "$PROPS"
          fi
          if ! grep -q "android.useAndroidX" "$PROPS"; then
            echo "android.useAndroidX=true"  >> "$PROPS"
            echo "android.enableJetifier=false" >> "$PROPS"
            echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" >> "$PROPS"
            echo "Injected android.useAndroidX=true into gradle.properties"
          else
            echo "android.useAndroidX already set: $(grep android.useAndroidX "$PROPS")"
          fi
          cat "$PROPS"

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: palmgrade-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-reports-${{ github.run_number }}
          path: app/build/reports/
          retention-days: 7

  # ── Release build ────────────────────────────────────────────────────────
  build-release:
    name: Release APK
    runs-on: ubuntu-latest
    if: >
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.build_type == 'release')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >
            platforms;android-${{ env.ANDROID_API }}
            build-tools;${{ env.BUILD_TOOLS }}

      - name: Ensure gradle.properties has android.useAndroidX
        run: |
          PROPS="gradle.properties"
          if [ ! -f "$PROPS" ]; then touch "$PROPS"; fi
          if ! grep -q "android.useAndroidX" "$PROPS"; then
            echo "android.useAndroidX=true"  >> "$PROPS"
            echo "android.enableJetifier=false" >> "$PROPS"
            echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" >> "$PROPS"
          fi

      - name: Decode keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        if: env.SIGNING_KEYSTORE_BASE64 != ''
        run: |
          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode \
            > $RUNNER_TEMP/palmgrade-release.jks
          echo "PALMGRADE_STORE_FILE=$RUNNER_TEMP/palmgrade-release.jks" \
            >> $GITHUB_ENV

      - name: Build signed release APK
        if: env.PALMGRADE_STORE_FILE != ''
        run: |
          gradle assembleRelease \
            -PPALMGRADE_STORE_FILE="$PALMGRADE_STORE_FILE" \
            -PPALMGRADE_STORE_PASSWORD="${{ secrets.PALMGRADE_STORE_PASSWORD }}" \
            -PPALMGRADE_KEY_ALIAS="${{ secrets.PALMGRADE_KEY_ALIAS }}" \
            -PPALMGRADE_KEY_PASSWORD="${{ secrets.PALMGRADE_KEY_PASSWORD }}" \
            --stacktrace --no-daemon

      - name: Build unsigned release APK (no keystore)
        if: env.PALMGRADE_STORE_FILE == ''
        run: gradle assembleRelease --stacktrace --no-daemon

      - name: Rename APK
        run: |
          TAG="${GITHUB_REF_NAME:-manual-$(date +%Y%m%d)}"
          find app/build/outputs/apk/release/ -name "*.apk" \
            -exec mv {} "app/build/outputs/apk/release/palmgrade-rns-${TAG}.apk" \; \
            2>/dev/null || true

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: palmgrade-release-${{ github.ref_name }}
          path: app/build/outputs/apk/release/palmgrade-rns-*.apk
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: PalmGrade RNS ${{ github.ref_name }}
          body: |
            ## PalmGrade RNS ${{ github.ref_name }}

            Oil palm bunch quality checker over Reticulum Network Stack (RNS/LXMF).

            ### Requirements
            - Android 8.0+ (API 26+)
            - RNode Bluetooth Classic radio (433.025 MHz LoRa)

            ### Install via ADB
            ```bash
            adb install palmgrade-rns-${{ github.ref_name }}.apk
            ```
          files: app/build/outputs/apk/release/palmgrade-rns-*.apk

  # ── Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >
            platforms;android-${{ env.ANDROID_API }}
            build-tools;${{ env.BUILD_TOOLS }}

      - name: Ensure gradle.properties has android.useAndroidX
        run: |
          PROPS="gradle.properties"
          if [ ! -f "$PROPS" ]; then touch "$PROPS"; fi
          if ! grep -q "android.useAndroidX" "$PROPS"; then
            echo "android.useAndroidX=true"  >> "$PROPS"
            echo "android.enableJetifier=false" >> "$PROPS"
          fi

      - name: Run Lint
        run: gradle lint --no-daemon

      - name: Upload Lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ github.run_number }}
          path: app/build/reports/lint-results*.html
          retention-days: 14
